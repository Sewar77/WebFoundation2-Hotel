<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <section>
      <h1>Animation</h1>
      <div class="grid">
        <div class="card fade-in"></div>
        <div class="card slide-left"></div>
        <div class="card slide-left2"></div>
        <div class="card bounce"></div>
        <div class="card routat"></div>
        <div class="card pulse"></div>
        <div class="card glow"></div>
      </div>
    </section>
    <section>
      <h1>Transform</h1>
      <div class="grid">
        <div class="card transform t-translate"></div>
        <div class="card transform t-scale"></div>
        <div class="card transform t-rotate"></div>
        <div class="card transform t-skew"></div>
        <div class="card transform t-flip">
          <div class="card transform t-inner-flip"></div>
        </div>
      </div>
    </section>
  </body>
</html>
